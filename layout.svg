&lt;svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg"&gt;
  &lt;defs&gt;
    &lt;style&gt;
      .border { stroke: #000; stroke-width: 4; fill: none; }
      .inner-border { stroke: #333; stroke-width: 2; fill: none; }
      .field { fill: #87CEEB; stroke: #4682B4; stroke-width: 1; }
      .bund { fill: #8B4513; }
      .tree { fill: #228B22; }
      .text { font-family: Arial, sans-serif; font-size: 12px; fill: #000; }
      .title { font-size: 16px; font-weight: bold; text-anchor: middle; }
      .label { font-size: 10px; text-anchor: middle; }
    &lt;/style&gt;
  &lt;/defs&gt;

  &lt;!-- Outer border layer 1 --&gt;
  &lt;rect x="10" y="10" width="780" height="580" class="border" /&gt;

  &lt;!-- Border layer 2 --&gt;
  &lt;rect x="20" y="20" width="760" height="560" class="border" /&gt;

  &lt;!-- Border layer 3 --&gt;
  &lt;rect x="30" y="30" width="740" height="540" class="inner-border" /&gt;

  &lt;!-- Border layer 4 --&gt;
  &lt;rect x="40" y="40" width="720" height="520" class="inner-border" /&gt;

  &lt;!-- Title --&gt;
